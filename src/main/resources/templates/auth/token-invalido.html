<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link indisponivel | Rota TI</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="site-header auth-header">
    <a class="brand brand-lockup" th:href="@{/}" aria-label="Rota TI - pagina inicial">
        <span class="brand-mark" aria-hidden="true">RT</span>
        <span>Rota TI<small>Orientacao profissional</small></span>
    </a>
</header>
<main class="error-main">
    <p class="eyebrow">Link protegido</p>
    <h1>Este link e invalido, expirou ou ja foi utilizado.</h1>
    <p>Solicite uma nova recuperacao para continuar sem expor os dados da sua conta.</p>
    <div class="actions">
        <a class="button primary" th:href="@{/esqueci-senha}">Solicitar novo link</a>
        <a class="button secondary" th:href="@{/entrar}">Voltar ao login</a>
    </div>
</main>
</body>
</html>
