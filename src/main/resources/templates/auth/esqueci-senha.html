<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Solicite um link seguro para redefinir a senha da sua conta Rota TI.">
    <title>Recuperar senha | Rota TI</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-page">
<header class="site-header auth-header">
    <a class="brand brand-lockup" th:href="@{/}" aria-label="Rota TI - pagina inicial">
        <span class="brand-mark" aria-hidden="true">RT</span>
        <span>Rota TI<small>Orientacao profissional</small></span>
    </a>
    <a th:href="@{/entrar}">Voltar ao login</a>
</header>

<main class="auth-main">
    <section class="auth-panel" aria-labelledby="recuperacao-title">
        <div class="auth-heading">
            <p class="eyebrow">Recuperacao segura</p>
            <h1 id="recuperacao-title">Redefina sua senha.</h1>
            <p>Informe o e-mail da conta. O link enviado expira em 15 minutos e funciona uma unica vez.</p>
        </div>

        <p class="form-alert success" th:if="${mensagem}" th:text="${mensagem}">Instrucoes enviadas.</p>
        <p class="form-alert warning" th:if="${!emailConfigurado}">O envio de e-mail ainda nao esta configurado neste ambiente.</p>

        <form class="auth-form" th:action="@{/esqueci-senha}" th:object="${solicitacaoForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label for="email">E-mail</label>
            <input id="email" type="email" th:field="*{email}" maxlength="150" autocomplete="email" required autofocus>
            <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">E-mail invalido</span>

            <button class="button primary" type="submit">Enviar link de recuperacao</button>
        </form>
    </section>
</main>
</body>
</html>
