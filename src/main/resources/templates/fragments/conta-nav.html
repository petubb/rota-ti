<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="links">
    <a th:if="${contaLogada == null}" th:href="@{/entrar}">Entrar</a>
    <a th:if="${contaAdmin}" th:href="@{/dashboard}">Dashboard</a>
    <a th:if="${contaLogada != null}" th:href="@{/minha-conta/resultados}">Meus resultados</a>
    <form class="account-logout-form" th:if="${contaLogada != null}" th:action="@{/sair}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="account-logout" type="submit">Sair</button>
    </form>
</th:block>
</body>
</html>
