<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Perguntas de desempate para refinar o resultado do questionario Rota TI.">
    <title>Ajuste final | Rota TI</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script defer th:src="@{/js/quiz.js}"></script>
</head>
<body class="quiz-page">
<header class="site-header quiz-header">
    <a class="brand brand-lockup" th:href="@{/}" aria-label="Rota TI - pagina inicial">
        <span class="brand-mark" aria-hidden="true">RT</span>
        <span>Rota TI<small>Orienta&ccedil;&atilde;o profissional</small></span>
    </a>
    <a class="quiz-exit" th:href="@{/quiz}">Recome&ccedil;ar</a>
</header>

<main class="quiz-main">
    <section class="quiz-intro" aria-labelledby="quiz-title">
        <p class="eyebrow">Ajuste final</p>
        <h1 id="quiz-title">Duas rotas ficaram bem pr&oacute;ximas.</h1>
        <p>Responda s&oacute; mais duas perguntas para o resultado refletir melhor suas prefer&ecirc;ncias.</p>
    </section>

    <form class="quiz-form quiz-wizard" th:action="@{/quiz/desempate}" th:object="${submission}" method="post"
          data-quiz-wizard data-step-prefix="Ajuste">
        <div class="quiz-progress" role="progressbar" aria-label="Progresso do desempate"
             aria-valuemin="0" th:aria-valuemax="${#lists.size(perguntas)}" aria-valuenow="0">
            <div class="quiz-progress-copy">
                <span data-step-label>Ajuste 1</span>
                <span><strong data-progress-current>0</strong> de <span th:text="${#lists.size(perguntas)}">2</span></span>
            </div>
            <div class="quiz-progress-track" aria-hidden="true"><span data-progress-bar></span></div>
        </div>

        <p class="error block quiz-global-error" th:if="${erroDesempate}" th:text="${erroDesempate}">
            Responda as duas perguntas.
        </p>

        <div class="quiz-stage">
            <div class="question-list">
                <fieldset class="question quiz-step quiz-question-step" th:each="pergunta, status : ${perguntas}"
                          data-quiz-step data-question-step th:attr="data-question-number=${status.count}">
                    <legend tabindex="-1">
                        <span class="quiz-step-number" th:text="|Ajuste ${status.count} de ${#lists.size(perguntas)}|">Ajuste 1 de 2</span>
                        <span class="quiz-question-text" th:text="${pergunta.texto}">Pergunta</span>
                    </legend>
                    <div class="quiz-answer-list">
                        <label class="quiz-answer">
                            <input type="radio" th:name="${'respostas[' + pergunta.id + ']'}" value="-1" required>
                            <span class="quiz-answer-control" aria-hidden="true"></span>
                            <span class="quiz-answer-copy">
                                <strong>Discordo</strong>
                                <small>Prefiro mais a outra dire&ccedil;&atilde;o</small>
                            </span>
                        </label>
                        <label class="quiz-answer">
                            <input type="radio" th:name="${'respostas[' + pergunta.id + ']'}" value="0" required>
                            <span class="quiz-answer-control" aria-hidden="true"></span>
                            <span class="quiz-answer-copy">
                                <strong>Neutro</strong>
                                <small>As duas possibilidades combinam comigo</small>
                            </span>
                        </label>
                        <label class="quiz-answer">
                            <input type="radio" th:name="${'respostas[' + pergunta.id + ']'}" value="1" required>
                            <span class="quiz-answer-control" aria-hidden="true"></span>
                            <span class="quiz-answer-copy">
                                <strong>Concordo</strong>
                                <small>Essa dire&ccedil;&atilde;o combina mais comigo</small>
                            </span>
                        </label>
                    </div>
                </fieldset>
            </div>
        </div>

        <p class="quiz-step-error" data-step-error role="alert" aria-live="polite"></p>

        <div class="quiz-controls">
            <button class="button secondary quiz-back" type="button" data-quiz-back>Voltar</button>
            <button class="button primary quiz-next" type="button" data-quiz-next>Continuar <span aria-hidden="true">&rarr;</span></button>
            <button class="button primary quiz-submit" type="submit" data-quiz-submit>Ver meu resultado <span aria-hidden="true">&rarr;</span></button>
        </div>
    </form>
</main>
</body>
</html>
